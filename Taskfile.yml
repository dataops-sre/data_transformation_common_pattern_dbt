version: "3"

vars:
  DBT_PROFILES_DIR: "/workspace/"
  DBT_TARGET: dev

tasks:
  default:
    desc: "List all available tasks"
    cmds:
      - task --list

  # Core commands
  run:
    desc: "Run arbitrary command in container"
    cmds:
      - docker compose run --rm --build dbt sh -c "{{.CLI_ARGS}}"

  setup:
    desc: "Initial project setup"
    cmds:
      - docker compose build
      - task: run
        vars:
          CLI_ARGS: "dbt deps --profiles-dir {{.DBT_PROFILES_DIR}} --target {{.DBT_TARGET}}"

  # dbt essentials
  dbt-run:
    desc: "Run dbt models"
    cmds:
      - task: run
        vars:
          CLI_ARGS: "dbt run --profiles-dir {{.DBT_PROFILES_DIR}} --target {{.DBT_TARGET}}"

  dbt-run-full:
    desc: "Run dbt models with full refresh"
    cmds:
      - task: run
        vars:
          CLI_ARGS: "dbt run --full-refresh --profiles-dir {{.DBT_PROFILES_DIR}} --target {{.DBT_TARGET}}"

  test:
    desc: "Run dbt tests"
    cmds:
      - task: run
        vars:
          CLI_ARGS: "dbt test --profiles-dir {{.DBT_PROFILES_DIR}} --target {{.DBT_TARGET}}"

  build:
    desc: "Build models and run tests"
    cmds:
      - task: run
        vars:
          CLI_ARGS: "dbt build --profiles-dir {{.DBT_PROFILES_DIR}} --target {{.DBT_TARGET}}"

  # Code quality
  lint:
    desc: "Lint SQL files"
    cmds:
      - task: run
        vars:
          CLI_ARGS: "sqlfluff lint models/ --dialect duckdb"

  format:
    desc: "Format SQL files"
    cmds:
      - task: run
        vars:
          CLI_ARGS: "sqlfluff fix models/ --dialect duckdb"

  # Development workflow
  dev:
    desc: "Development cycle: format → run → test"
    cmds:
      - task: format
      - task: dbt-run-full
      - task: test

  # Utilities
  docs:
    desc: "Generate and serve documentation"
    cmds:
      - task: run
        vars:
          CLI_ARGS: "dbt docs generate --profiles-dir {{.DBT_PROFILES_DIR}} --target {{.DBT_TARGET}}"
      - task: run
        vars:
          CLI_ARGS: "dbt docs serve --profiles-dir {{.DBT_PROFILES_DIR}} --target {{.DBT_TARGET}} --port 8080"

  clean:
    desc: "Clean artifacts"
    cmds:
      - task: run
        vars:
          CLI_ARGS: "dbt clean --profiles-dir {{.DBT_PROFILES_DIR}}"
      - docker compose down -v

  # DuckDB UI with DuckLake
  datalake-start:
    desc: "Start DuckDB UI with DuckLake (http://localhost:8080)"
    cmds:
      - docker compose up -d ducklake-ui nginx-proxy
      - echo "🚀 Ducklake starting..."

  datalake-stop:
    desc: "Stop Ducklake"
    cmds:
      - docker compose stop ducklake-ui nginx-proxy
      # clean storage too
      - docker compose down -v
      - echo "✅ Ducklake stopped"
