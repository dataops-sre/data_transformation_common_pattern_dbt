services:
  ducklake_catalog:
    hostname: ducklake_catalog
    container_name: ducklake_catalog
    image: postgres:18.3
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quack
      POSTGRES_PASSWORD: quack
      POSTGRES_DB: ducklake_catalog
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quack -d ducklake_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    hostname: minio
    container_name: minio
    image: "pgsty/minio:RELEASE.2026-03-25T00-00-00Z"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_VOLUMES: "/data"
    volumes:
      - ${PWD}/minio-data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: "pgsty/minio:RELEASE.2026-03-25T00-00-00Z"
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 minio minio123;
      /usr/bin/mc rm -r --force minio/datalake;
      /usr/bin/mc mb minio/datalake;
      exit 0;
      "

  ducklake-ui:
    hostname: ducklake-ui
    container_name: ducklake-ui
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ducklake-ui:latest
    depends_on:
      ducklake_catalog:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      # postgresql db as catalog
      - PGHOST=ducklake_catalog
      - PGPORT=5432
      - PGDATABASE=ducklake_catalog
      - PGUSER=quack
      - PGPASSWORD=quack
      # minio as s3 bucket
      - DUCKDB_S3_USE_SSL=FALSE
      - DUCKDB_S3_ENDPOINT=minio:9000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - URL_STYLE=path
      - BUCKET_NAME=datalake
    command: ["python", "-u", "ducklake_ui_server.py", "start"]

  nginx-proxy:
    image: nginx:1.28.3
    container_name: nginx-proxy
    depends_on:
      - ducklake-ui
    # This is the magic line. It shares the localhost interface with the service above.
    network_mode: "service:ducklake-ui"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # You expose the Nginx port to your host machine here

  dbt:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dbt-duckdb-runner
    ports:
      - "4213:4213"
    volumes:
      # Mount entire project (including dbt models, profiles, etc.)
      - ./:/workspace
    environment:
      # Tell dbt where to find profiles.yml (adjust path as needed)
      - DBT_PROFILES_DIR=/workspace
      # postgresql db as catalog
      - PGHOST=ducklake_catalog
      - PGPORT=5432
      - PGDATABASE=ducklake_catalog
      - PGUSER=quack
      - PGPASSWORD=quack
      # minio as s3 bucket
      - DUCKDB_S3_USE_SSL=FALSE
      - DUCKDB_S3_ENDPOINT=minio:9000
      - AWS_REGION="us-east-1"
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - URL_STYLE=path
      - BUCKET_NAME=datalake
    working_dir: /workspace
    stdin_open: true
    tty: true
